<!DOCTYPE html>
<html>
<head>
  <title>Persona Adaptive AI Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body id="body" class="bg-gray-100 dark:bg-gray-900 h-screen flex items-center justify-center transition duration-500">

<div class="bg-white dark:bg-gray-800 shadow-2xl rounded-2xl w-full max-w-md p-6">

  <div class="flex justify-between items-center mb-4">
    <h1 class="text-xl font-bold text-gray-800 dark:text-white">
      Persona Support Agent
    </h1>
    <button onclick="toggleMode()" class="text-sm bg-gray-200 dark:bg-gray-700 px-3 py-1 rounded">
      Toggle Mode
    </button>
  </div>

  <div id="chatBox" class="h-72 overflow-y-auto border rounded p-3 mb-4 text-sm"></div>

  <input id="userInput" class="w-full border p-2 rounded mb-2 dark:bg-gray-700 dark:text-white" placeholder="Ask something..."/>

  <button onclick="sendMessage()" class="w-full bg-indigo-600 text-white p-2 rounded hover:bg-indigo-700 transition">
    Send
  </button>
</div>

<script src="/static/script.js"></script>
</body>
</html>
